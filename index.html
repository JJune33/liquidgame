<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Liquid Absorb v7</title>
  <style>
    :root {
      --ink: #f8fbff;
      --muted: rgba(248, 251, 255, 0.76);
      --glass: rgba(7, 12, 28, 0.62);
      --line: rgba(255, 255, 255, 0.18);
      --good: rgba(247, 255, 253, 0.96);
      --good-glow: rgba(119, 255, 225, 0.82);
      --danger: #ff3868;
      --warn: rgba(255, 56, 104, 0.92);
      --gold: #ffe079;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #060815;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
      touch-action: none;
    }

    button { font: inherit; }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
      cursor: none;
      background: #070a17;
    }

    #effectTarget {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(82, 255, 218, 0.42), transparent 26%),
        radial-gradient(circle at 76% 20%, rgba(91, 89, 255, 0.38), transparent 30%),
        radial-gradient(circle at 52% 90%, rgba(255, 220, 120, 0.32), transparent 34%),
        linear-gradient(135deg, #081126 0%, #12285a 42%, #071021 100%);
    }

    #effectTarget::before {
      content: "";
      position: absolute;
      inset: -18%;
      background:
        linear-gradient(rgba(255,255,255,0.16) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.16) 1px, transparent 1px),
        repeating-linear-gradient(135deg, rgba(255,255,255,0.06) 0 2px, transparent 2px 20px);
      background-size: 46px 46px, 46px 46px, 100% 100%;
      opacity: 0.78;
      transform: rotate(-7deg);
      animation: fieldDrift 28s linear infinite;
    }

    #effectTarget::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 48%, transparent 0 34%, rgba(255,255,255,0.12) 35% 36%, transparent 37% 100%),
        linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent),
        radial-gradient(circle at 50% 10%, rgba(255,255,255,0.2), transparent 34%);
      mix-blend-mode: screen;
      opacity: 0.72;
      pointer-events: none;
    }

    .bg-card {
      position: absolute;
      border-radius: 30px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.2), rgba(255,255,255,0.04)),
        rgba(255,255,255,0.08);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.22),
        0 28px 90px rgba(0,0,0,0.18);
      overflow: hidden;
    }

    .bg-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(115deg, transparent 0 36%, rgba(255,255,255,0.34) 37% 38%, transparent 39% 100%),
        radial-gradient(circle at 22% 18%, rgba(112,255,226,0.24), transparent 36%);
    }

    .bg-card.a { left: 5vw; top: 14vh; width: 24vw; height: 26vh; min-width: 180px; }
    .bg-card.b { right: 7vw; top: 11vh; width: 28vw; height: 20vh; min-width: 210px; }
    .bg-card.c { left: 12vw; bottom: 9vh; width: 31vw; height: 22vh; min-width: 230px; }
    .bg-card.d { right: 10vw; bottom: 13vh; width: 22vw; height: 28vh; min-width: 170px; }

    @keyframes fieldDrift {
      from { transform: translate3d(0, 0, 0) rotate(-7deg); }
      to { transform: translate3d(-46px, -46px, 0) rotate(-5deg); }
    }

    #targetsLayer {
      position: absolute;
      inset: 0;
      z-index: 8;
      overflow: hidden;
      pointer-events: none;
    }

    .target {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--size, 58px);
      height: var(--size, 58px);
      transform: translate3d(-50%, -50%, 0) rotate(var(--rot, 0deg)) scale(var(--scale, 1));
      opacity: 0.98;
      will-change: left, top, transform, opacity;
      filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.32));
    }

    .target::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,1), rgba(255,255,255,0.28) 18%, transparent 31%),
        radial-gradient(circle at 72% 78%, rgba(255,255,255,0.22), transparent 32%),
        linear-gradient(145deg, rgba(255,255,255,0.92), rgba(208,255,246,0.58));
      box-shadow:
        inset 12px 15px 24px rgba(255,255,255,0.52),
        inset -16px -20px 28px rgba(10, 61, 86, 0.28),
        0 0 28px var(--good-glow),
        0 0 58px rgba(119,255,225,0.24);
      border: 1px solid rgba(255,255,255,0.7);
    }

    .target.sphere { border-radius: 999px; }
    .target.cube { border-radius: 28%; }
    .target.ring { border-radius: 999px; }

    .target.ring::after {
      content: "";
      position: absolute;
      inset: 29%;
      border-radius: 999px;
      background: rgba(7, 12, 28, 0.74);
      box-shadow:
        inset 0 0 16px rgba(255,255,255,0.42),
        0 0 16px rgba(255,255,255,0.18);
    }

    .target.bad::before {
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,0.95), rgba(255,255,255,0.19) 18%, transparent 31%),
        linear-gradient(145deg, rgba(255,160,185,0.95), rgba(255,40,92,0.78));
      box-shadow:
        inset 12px 15px 24px rgba(255,255,255,0.34),
        inset -16px -20px 28px rgba(72, 0, 24, 0.34),
        0 0 34px rgba(255,56,104,0.82),
        0 0 70px rgba(255,56,104,0.3);
      border-color: rgba(255,255,255,0.48);
    }

    .target.bad.ring::after { background: rgba(74, 0, 28, 0.72); }

    .target.absorbing {
      opacity: 0.9;
      filter: drop-shadow(0 0 24px rgba(140,255,231,0.9));
    }

    .target.absorbing::before {
      box-shadow:
        inset 12px 15px 24px rgba(255,255,255,0.62),
        inset -16px -20px 28px rgba(10, 61, 86, 0.22),
        0 0 42px rgba(160,255,236,0.96),
        0 0 86px rgba(119,255,225,0.44);
    }

    #playerFallback {
      position: absolute;
      z-index: 7;
      left: 50%;
      top: 50%;
      width: 150px;
      height: 150px;
      margin: -75px 0 0 -75px;
      border-radius: 999px;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 29% 21%, rgba(255,255,255,0.94), rgba(255,255,255,0.14) 20%, transparent 33%),
        radial-gradient(circle at 70% 80%, rgba(255,255,255,0.18), transparent 40%),
        linear-gradient(145deg, rgba(255,255,255,0.22), rgba(121,255,229,0.18));
      box-shadow:
        inset 18px 22px 40px rgba(255,255,255,0.28),
        inset -22px -28px 48px rgba(0, 30, 50, 0.36),
        0 0 84px rgba(105,255,224,0.3);
      backdrop-filter: blur(8px) saturate(150%);
    }

    .no-vfx #playerFallback { opacity: 0.5; }

    .statusbar {
      position: absolute;
      z-index: 30;
      left: max(10px, env(safe-area-inset-left));
      right: max(10px, env(safe-area-inset-right));
      top: max(10px, env(safe-area-inset-top));
      min-height: 46px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--glass);
      color: #fff;
      backdrop-filter: blur(18px) saturate(170%);
      box-shadow: 0 18px 50px rgba(0,0,0,0.28);
      pointer-events: auto;
    }

    .stat {
      display: flex;
      align-items: baseline;
      gap: 5px;
      white-space: nowrap;
      padding: 0 7px;
      font-size: 12px;
      color: var(--muted);
    }

    .stat strong {
      color: #fff;
      font-size: 16px;
      line-height: 1;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }

    .progress {
      flex: 1 1 auto;
      min-width: 58px;
      height: 9px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    #progressFill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ffffff, #7dffe7, #ffe079);
      box-shadow: 0 0 18px rgba(125,255,231,0.85);
      transition: width 130ms ease;
    }

    .barButton {
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 8px 12px;
      color: #06101a;
      background: linear-gradient(135deg, #ffffff, #89ffe8);
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .barButton.secondary {
      color: #fff;
      background: rgba(255,255,255,0.1);
    }

    #miniHelp {
      position: absolute;
      z-index: 31;
      left: 50%;
      bottom: max(14px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      max-width: min(640px, calc(100vw - 22px));
      padding: 10px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(7, 12, 28, 0.62);
      backdrop-filter: blur(18px) saturate(170%);
      color: rgba(255,255,255,0.82);
      font-size: 13px;
      line-height: 1.25;
      text-align: center;
      box-shadow: 0 18px 48px rgba(0,0,0,0.28);
      pointer-events: none;
    }

    #toast {
      position: absolute;
      z-index: 32;
      left: 50%;
      top: max(68px, calc(env(safe-area-inset-top) + 68px));
      transform: translate(-50%, -8px);
      opacity: 0;
      min-width: 160px;
      max-width: calc(100vw - 30px);
      text-align: center;
      padding: 10px 14px;
      border-radius: 999px;
      color: #06101a;
      background: linear-gradient(135deg, #ffffff, #8dffe9, #ffe079);
      font-weight: 800;
      box-shadow: 0 18px 48px rgba(0,0,0,0.26);
      transition: opacity 170ms ease, transform 170ms ease;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .pulse {
      position: absolute;
      z-index: 22;
      left: 0;
      top: 0;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.94);
      transform: translate3d(-50%, -50%, 0) scale(0.25);
      pointer-events: none;
      animation: pulse 520ms ease-out forwards;
      box-shadow: 0 0 34px rgba(126,255,231,0.9);
    }

    @keyframes pulse {
      to { opacity: 0; transform: translate3d(-50%, -50%, 0) scale(5.6); }
    }

    .shake { animation: shake 260ms ease-out; }
    @keyframes shake {
      20% { transform: translate3d(-8px, 0, 0); }
      45% { transform: translate3d(7px, 0, 0); }
      70% { transform: translate3d(-4px, 0, 0); }
    }

    @media (max-width: 760px) {
      .statusbar {
        gap: 5px;
        padding: 6px;
      }
      .stat {
        font-size: 10px;
        padding: 0 3px;
        gap: 3px;
      }
      .stat strong { font-size: 14px; }
      .stat.optional { display: none; }
      .barButton { padding: 8px 9px; font-size: 12px; }
      #miniHelp { font-size: 12px; border-radius: 18px; }
      .bg-card.a { left: -6vw; width: 42vw; }
      .bg-card.b { right: -8vw; width: 50vw; }
      .bg-card.c { left: 4vw; width: 54vw; }
      .bg-card.d { right: 0; width: 42vw; }
    }

    @media (max-height: 520px) {
      #miniHelp { display: none; }
      .statusbar { min-height: 40px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="effectTarget" aria-hidden="true">
      <div class="bg-card a"></div>
      <div class="bg-card b"></div>
      <div class="bg-card c"></div>
      <div class="bg-card d"></div>
    </div>

    <div id="targetsLayer" aria-hidden="true"></div>
    <div id="playerFallback" aria-hidden="true"></div>

    <div class="statusbar" aria-label="Spel status">
      <div class="stat">Score <strong id="score">0</strong></div>
      <div class="stat">Lvl <strong id="level">1</strong></div>
      <div class="stat optional">Vang <strong id="shape">Bol</strong></div>
      <div class="stat">❤ <strong id="lives">3</strong></div>
      <div class="stat optional"><strong id="progressText">0/10</strong></div>
      <div class="progress" aria-hidden="true"><div id="progressFill"></div></div>
      <button id="startBtn" class="barButton" type="button">Start</button>
      <button id="resetBtn" class="barButton secondary" type="button">Reset</button>
    </div>

    <div id="toast">Level 1: vang bollen</div>
    <div id="miniHelp">Beweeg de liquid orb met je vinger of muis. Absorbeer de witte juiste vorm, ontwijk rood.</div>
  </div>

  <script type="module">
    const PARAMS = {
      sphereR: 0.12,
      bubbleCount: 8,
      bubbleRadiusMin: 0.03,
      bubbleRadiusMax: 0.07,
      bubbleSpeed: 0.7,
      mouseSmoothing: 0.05
    };

    const postEffectShader = `
      precision highp float;
      uniform sampler2D src;
      uniform vec2 resolution;
      uniform vec2 offset;
      uniform vec2 mouse;
      uniform vec2 lag;
      uniform float time;
      uniform float clickTime;
      uniform int clickCount;
      uniform int forcedShape;
      uniform float sphereScale;
      out vec4 outColor;
      const float SPHERE_R = ${PARAMS.sphereR.toFixed(4)};

      const float DISP = 0.025;
      const int   DISP_STEPS = 12;
      const float DISP_LO = 0.0;
      const float DISP_HI = 1.0;

      const float SCATTER = 0.03;

      const int N_BUBBLES = ${PARAMS.bubbleCount};
      const float BUBBLE_SMOOTH = 0.025;
      uniform float bubbleData[${PARAMS.bubbleCount * 4}];

      const vec3 ABSORB = vec3(2.0, 1.2, 1.0) * 3.;
      float smin(float a, float b, float k) {
        float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
        return mix(b, a, h) - k * h * (1.0 - h);
      }

      vec2 hash22(vec2 p) {
        vec3 p3 = fract(vec3(p.xyx) * vec3(0.1031, 0.1030, 0.0973));
        p3 += dot(p3, p3.yzx + 33.33);
        return fract((p3.xx + p3.yz) * p3.zy) * 2.0 - 1.0;
      }

      mat2 rot(float t) {
        float c = cos(t), s = sin(t);
        return mat2(c, -s, s, c);
      }
      float sdSphere(vec3 p, float r) {
        return length(p) - r;
      }

      float sdBox(vec3 p, vec3 b, float r) {
        vec3 q = abs(p) - b + r;
        return length(max(q,0.0)) + min(max(q.x,max(q.y,q.z)),0.0) - r;
      }

      float sdRing(vec3 p, vec2 r) {
        float s = length(p.xy) - r.x;
        return length(vec2(s, p.z)) - r.y;
      }

      float map(vec3 p, vec3 c) {
        vec3 q = p - c;
        float tt = clickTime * 5.0;
        float bounce = exp(-tt) * sin(tt) * 5. + (1. - exp(-tt));
        float s = bounce * 0.5 + 0.5;
        q /= s;

        q.xz *= rot(exp(-clickTime*3.0) * 8.);

        vec3 sp = q;
        sp.y += sin(sp.z * 29. + time * 6.5) * 0.01;
        sp.z += sin(sp.x * 23. + sp.y * 11. + time * 7.) * 0.01;
        sp.xy *= rot(time*1.3);
        sp.xz *= rot(time*1.1);
        float d;
        int objType = forcedShape;
        float rr = SPHERE_R * sphereScale;
        if (objType == 0) {
          d = sdSphere(sp, rr);
        } else if (objType == 1) {
          d = sdBox(sp, vec3(rr*0.8), 0.01);
        } else {
          d = sdRing(sp, vec2(rr*1.1, 0.015 * sphereScale));
        }
        for (int i = 0; i < N_BUBBLES; i++) {
          int b = i * 4;
          vec3 bPos = vec3(bubbleData[b], bubbleData[b+1], bubbleData[b+2]);
          float r = bubbleData[b+3];
          d = smin(d, sdSphere(q - bPos, max(r, 0.001)), BUBBLE_SMOOTH);
        }

        return d * s;
      }
      vec3 calcNormal(vec3 p, vec3 c) {
        vec2 e = vec2(0.001, 0.0);
        return normalize(vec3(
          map(p + e.xyy, c) - map(p - e.xyy, c),
          map(p + e.yxy, c) - map(p - e.yxy, c),
          map(p + e.yyx, c) - map(p - e.yyx, c)
        ));
      }

      vec3 spectrum(float x) {
        return clamp(vec3(
          1.5 - abs(4.0 * x - 1.0),
          1.5 - abs(4.0 * x - 2.0),
          1.5 - abs(4.0 * x - 3.0)
        ), 0.0, 1.0);
      }
      vec4 getSrc(vec2 uv) {
        vec4 c = texture(src, uv);
        return mix(vec4(1), c, c.a);
      }

      void main() {
        vec2 uv = (gl_FragCoord.xy - offset) / resolution;
        float aspect = resolution.y / resolution.x;

        vec2 p = (uv - 0.5) * vec2(1.0, aspect);
        vec2 mp = ((mouse + lag) / resolution - 0.5) * vec2(1.0, aspect);

        vec3 ro = vec3(0.0, 0.0, -2.0);
        float focal = 2.0;
        vec3 rd = normalize(vec3(p, focal));
        vec3 c = vec3(mp, 0.0);

        vec3 firstN = vec3(0.0);
        vec3 lastN = vec3(0.0);
        int hitCount = 0;

        float thickness = 0.0;
        float tEntry = 0.0;
        float t = 0.0;
        bool inside = false;
        for (int i = 0; i < 50; i++) {
          if (t > 10.0) break;

          vec3 pos = ro + rd * t;
          float d = map(pos, c);
          float step = inside ? -d : d;
          if (step < 3e-4) {
            vec3 n = calcNormal(pos, c);
            if (hitCount == 0) firstN = n;
            lastN = n;
            if (!inside) {
              tEntry = t;
            } else {
              thickness += t - tEntry;
            }

            hitCount++;
            if (hitCount >= 4) { break; }
            inside = !inside;
            t += 0.01;
          } else {
            t += step;
          }
        }

        if (hitCount > 0) {
          vec2 baseDisp = -(firstN.xy + lastN.xy) * 0.5 * DISP;

          float NdotR = max(dot(firstN, -rd), 0.0);
          float scatter = pow((1.0 - NdotR), 2.0) * SCATTER;
          vec3 acc = vec3(0.0);
          vec3 wsum = vec3(0.0);
          for (int i = 0; i < DISP_STEPS; i++) {
            float wl = float(i) / float(DISP_STEPS - 1);
            float k = mix(DISP_LO, DISP_HI, wl) * (1.3 + float(hitCount) * 0.2);
            vec2 h = hash22(uv * 1000.0 + float(i) * 7.13 + time) * scatter;
            vec3 w = spectrum(wl);
            acc += getSrc(uv + baseDisp * k + h).rgb * w;
            wsum += w;
          }
          vec3 col = acc / wsum * 0.99;
          col -= float(hitCount) * 0.05;
          col += 0.1;

          float fres = pow(1.0 - NdotR, 5.0);
          col *= 1. + fres;

          float f2 = 1. - pow(NdotR, 3.0);
          col *= mix(vec3(1), exp(-ABSORB * thickness), f2);
          col *= 1. + f2;

          vec3 ld = normalize(vec3(0.5, 0.9, -0.3));
          float spec = pow(max(dot(reflect(-ld, firstN), -rd), 0.0), 200.0);
          col += spec * 30.;
          ld = normalize(vec3(-0.9, 0.4, -0.3));
          spec = pow(max(dot(reflect(-ld, firstN), -rd), 0.0), 300.0);
          col += spec * 3.;

          ld = normalize(vec3(-0.1, -0.9, -0.1));
          spec = pow(max(dot(reflect(-ld, firstN), -rd), 0.0), 30.0);
          col += spec * 0.5;

          col = min(col, 1.);
          col = 1. - abs(col + fres * .5 - 1.);
          outColor = vec4(col, 1.0);
        } else {
          outColor = getSrc(uv);
        }
      }
    `;

    const app = document.getElementById("app");
    const effectTarget = document.getElementById("effectTarget");
    const targetsLayer = document.getElementById("targetsLayer");
    const playerFallback = document.getElementById("playerFallback");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const toast = document.getElementById("toast");
    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const livesEl = document.getElementById("lives");
    const shapeEl = document.getElementById("shape");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");

    const shapeSequence = [
      { shader: 0, name: "Bol", className: "sphere", plural: "bollen" },
      { shader: 2, name: "Donut", className: "ring", plural: "donuts" },
      { shader: 1, name: "Cube", className: "cube", plural: "cubes" }
    ];

    const state = {
      running: false,
      score: 0,
      lives: 3,
      level: 0,
      absorbed: 0,
      targetAbsorb: 10,
      growth: 1,
      lastPulseTime: performance.now() / 1000,
      clickCount: 0,
      hasPointer: false,
      toastTimer: 0
    };

    const player = {
      x: window.innerWidth / 2,
      y: window.innerHeight * 0.72
    };

    const p0 = { x: player.x, y: window.innerHeight - player.y };
    const p1 = { x: p0.x, y: p0.y };
    const p2 = { x: p0.x, y: p0.y };
    let centerBlend = 0;

    const objects = [];
    const shaderBubbles = new Float32Array(PARAMS.bubbleCount * 4);
    const t0 = performance.now() / 1000;
    let lastFrame = performance.now();

    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const rand = (min, max) => min + Math.random() * (max - min);
    const dist = (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by);
    const fract = (x) => x - Math.floor(x);

    function currentShape() {
      return shapeSequence[state.level % shapeSequence.length];
    }

    function otherShape() {
      const active = currentShape();
      const options = shapeSequence.filter((shape) => shape.shader !== active.shader);
      return options[Math.floor(Math.random() * options.length)];
    }

    function setPointer(clientX, clientY) {
      player.x = clamp(clientX, 0, window.innerWidth);
      player.y = clamp(clientY, 0, window.innerHeight);
      p0.x = player.x;
      p0.y = window.innerHeight - player.y;
      state.hasPointer = true;
      centerBlend = 0;
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      state.toastTimer = 1.5;
    }

    function makeObject() {
      const el = document.createElement("div");
      targetsLayer.appendChild(el);
      const obj = {
        el,
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        size: 58,
        shape: currentShape(),
        bad: false,
        rot: 0,
        spin: 0,
        justSpawned: true
      };
      objects.push(obj);
      resetObject(obj, true);
    }

    function resetObject(obj, first = false) {
      const active = currentShape();
      const bad = Math.random() < 0.34;
      obj.bad = bad;
      obj.shape = bad ? otherShape() : active;
      obj.size = rand(46, 70) * clamp(1 - state.level * 0.018, 0.82, 1.0);
      obj.x = rand(obj.size * 0.7, Math.max(obj.size, window.innerWidth - obj.size * 0.7));
      obj.y = first ? rand(-window.innerHeight * 0.9, -80) : rand(-260, -70);
      obj.vx = rand(-14, 14);
      obj.vy = rand(86, 132) + state.level * 11;
      obj.rot = rand(-25, 25);
      obj.spin = rand(-38, 38);
      obj.justSpawned = true;
      obj.el.className = `target ${obj.shape.className}${bad ? " bad" : ""}`;
      obj.el.style.setProperty("--size", `${obj.size}px`);
      obj.el.style.setProperty("--scale", "1");
      obj.el.style.opacity = "0.98";
    }

    function ensureObjects() {
      const wanted = clamp(8 + Math.floor(state.level / 2), 8, 13);
      while (objects.length < wanted) makeObject();
      while (objects.length > wanted) {
        const obj = objects.pop();
        obj.el.remove();
      }
    }

    function pulse(x, y, color = "rgba(126,255,231,0.95)") {
      const el = document.createElement("div");
      el.className = "pulse";
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      el.style.borderColor = color;
      el.style.boxShadow = `0 0 34px ${color}`;
      app.appendChild(el);
      el.addEventListener("animationend", () => el.remove());
    }

    function absorb(obj) {
      state.score += 100 + state.level * 25;
      state.absorbed += 1;
      state.growth = 1 + state.absorbed * 0.042;
      state.lastPulseTime = performance.now() / 1000;
      state.clickCount += 1;
      pulse(player.x, player.y);
      resetObject(obj, false);

      if (state.absorbed >= state.targetAbsorb) {
        state.level += 1;
        state.absorbed = 0;
        state.growth = 1;
        state.lastPulseTime = performance.now() / 1000;
        state.clickCount += 1;
        showToast(`Level ${state.level + 1}: vang ${currentShape().plural}`);
        pulse(player.x, player.y, "rgba(255,224,121,0.98)");
        ensureObjects();
        for (const item of objects) resetObject(item, true);
      }
    }

    function damage(obj) {
      state.lives -= 1;
      state.absorbed = clamp(state.absorbed - 3, 0, state.targetAbsorb);
      state.growth = 1 + state.absorbed * 0.042;
      state.lastPulseTime = performance.now() / 1000;
      state.clickCount += 1;
      pulse(obj.x, obj.y, "rgba(255,56,104,0.95)");
      app.classList.remove("shake");
      void app.offsetWidth;
      app.classList.add("shake");
      resetObject(obj, false);
      if (state.lives <= 0) {
        state.running = false;
        startBtn.textContent = "Opnieuw";
        showToast(`Game over: ${state.score}`);
      }
    }

    function resetGame() {
      state.running = true;
      state.score = 0;
      state.lives = 3;
      state.level = 0;
      state.absorbed = 0;
      state.growth = 1;
      state.lastPulseTime = performance.now() / 1000;
      state.clickCount += 1;
      startBtn.textContent = "Pauze";
      ensureObjects();
      for (const obj of objects) resetObject(obj, true);
      showToast("Level 1: vang bollen");
      updateHud();
    }

    function toggleStart() {
      if (state.lives <= 0 || state.score === 0 && !state.running && state.absorbed === 0) {
        resetGame();
        return;
      }
      state.running = !state.running;
      startBtn.textContent = state.running ? "Pauze" : "Start";
      showToast(state.running ? "Verder" : "Pauze");
    }

    function updateHud() {
      const shape = currentShape();
      scoreEl.textContent = String(state.score);
      levelEl.textContent = String(state.level + 1);
      livesEl.textContent = String(state.lives);
      shapeEl.textContent = shape.name;
      progressText.textContent = `${state.absorbed}/${state.targetAbsorb}`;
      progressFill.style.width = `${(state.absorbed / state.targetAbsorb) * 100}%`;
    }

    function updateShaderBubbles(time) {
      const visible = clamp(3 + state.absorbed, 3, PARAMS.bubbleCount);
      for (let i = 0; i < PARAMS.bubbleCount; i++) {
        const life = fract(time * PARAMS.bubbleSpeed + i / PARAMS.bubbleCount);
        const orbitR = PARAMS.sphereR * (0.30 + life * 0.82) * state.growth;
        const angle = time * (0.8 + fract(i * 0.618) * 0.7) + i * 1.256;
        const swing = Math.sin(time * 2.1 + i * 1.8) * 0.018;
        const j = i * 4;
        shaderBubbles[j] = Math.cos(angle) * orbitR + swing;
        shaderBubbles[j + 1] = Math.sin(angle * 1.21) * orbitR * 0.55 + life * 0.09;
        shaderBubbles[j + 2] = Math.sin(angle) * orbitR;
        const range = PARAMS.bubbleRadiusMax - PARAMS.bubbleRadiusMin;
        const maxR = PARAMS.bubbleRadiusMin + range * fract(i * 0.618);
        shaderBubbles[j + 3] = i < visible ? maxR * Math.sin(life * Math.PI) * (0.92 + state.absorbed * 0.018) : 0;
      }
    }

    function updateObjects(dt, time) {
      const playerRadius = Math.max(54, Math.min(window.innerWidth, window.innerHeight) * 0.14 * state.growth);
      const active = currentShape();

      for (const obj of objects) {
        let speedFactor = state.running ? 1 : 0.28;

        if (state.running) {
          const d = dist(obj.x, obj.y, player.x, player.y);
          const magnetRadius = playerRadius * 2.45;
          if (!obj.bad && obj.shape.shader === active.shader && d < magnetRadius) {
            const pull = clamp(1 - d / magnetRadius, 0, 1);
            obj.vx += (player.x - obj.x) * pull * 7.0 * dt;
            obj.vy += (player.y - obj.y) * pull * 7.0 * dt;
            obj.el.classList.add("absorbing");
            obj.el.style.setProperty("--scale", `${1 - pull * 0.18}`);
          } else {
            obj.el.classList.remove("absorbing");
            obj.el.style.setProperty("--scale", "1");
          }

          if (d < playerRadius * 0.78 + obj.size * 0.48) {
            if (!obj.bad && obj.shape.shader === active.shader) absorb(obj);
            else damage(obj);
            continue;
          }
        }

        obj.x += obj.vx * dt * speedFactor + Math.sin(time * 1.3 + obj.size) * 5 * dt;
        obj.y += obj.vy * dt * speedFactor;
        obj.rot += obj.spin * dt * speedFactor;

        if (obj.y > window.innerHeight + 120 || obj.x < -130 || obj.x > window.innerWidth + 130) {
          resetObject(obj, false);
        }

        obj.el.style.left = `${obj.x}px`;
        obj.el.style.top = `${obj.y}px`;
        obj.el.style.setProperty("--rot", `${obj.rot}deg`);
      }
    }

    function updateFallbackOrb() {
      const size = Math.max(120, Math.min(window.innerWidth, window.innerHeight) * 0.28 * state.growth);
      playerFallback.style.width = `${size}px`;
      playerFallback.style.height = `${size}px`;
      playerFallback.style.marginLeft = `${-size / 2}px`;
      playerFallback.style.marginTop = `${-size / 2}px`;
      playerFallback.style.left = `${player.x}px`;
      playerFallback.style.top = `${player.y}px`;
    }

    function frame(nowMs) {
      const dt = Math.min(0.04, (nowMs - lastFrame) / 1000);
      lastFrame = nowMs;
      const time = performance.now() / 1000 - t0;

      if (!state.hasPointer) {
        const cx = window.innerWidth / 2 + Math.cos(time * 0.34) * window.innerWidth * 0.16;
        const cy = window.innerHeight * 0.66 + Math.sin(time * 0.42) * window.innerHeight * 0.08;
        player.x = cx;
        player.y = cy;
        p0.x = cx;
        p0.y = window.innerHeight - cy;
      }

      p1.x += (p0.x - p1.x) * PARAMS.mouseSmoothing;
      p1.y += (p0.y - p1.y) * PARAMS.mouseSmoothing;
      p2.x += (p1.x - p2.x) * PARAMS.mouseSmoothing;
      p2.y += (p1.y - p2.y) * PARAMS.mouseSmoothing;

      updateObjects(dt, time);
      updateShaderBubbles(time);
      updateFallbackOrb();
      updateHud();

      if (state.toastTimer > 0) {
        state.toastTimer -= dt;
        if (state.toastTimer <= 0) toast.classList.remove("show");
      }

      requestAnimationFrame(frame);
    }

    async function setupVfx() {
      try {
        const { VFX } = await import("https://esm.sh/@vfx-js/core@0.11.1");
        const vfx = new VFX({
          postEffect: {
            shader: postEffectShader,
            uniforms: {
              lag: () => {
                const lx = (p1.x - p0.x) * devicePixelRatio;
                const ly = (p1.y - p0.y) * devicePixelRatio;
                const cx = window.innerWidth / 2 * devicePixelRatio * centerBlend;
                const cy = window.innerHeight / 2 * devicePixelRatio * centerBlend;
                return [cx + lx, cy + ly];
              },
              clickTime: () => performance.now() / 1000 - state.lastPulseTime,
              clickCount: () => state.clickCount,
              forcedShape: () => currentShape().shader,
              sphereScale: () => state.growth,
              bubbleData: () => shaderBubbles
            }
          }
        });
        await vfx.addHTML(effectTarget, { shader: "none" });
        vfx.play();
      } catch (error) {
        console.warn("VFX JS kon niet laden", error);
        app.classList.add("no-vfx");
        showToast("VFX niet geladen");
      }
    }

    window.addEventListener("pointermove", (event) => setPointer(event.clientX, event.clientY));
    window.addEventListener("pointerdown", (event) => {
      if (event.target.closest("button")) return;
      setPointer(event.clientX, event.clientY);
      state.lastPulseTime = performance.now() / 1000;
      state.clickCount += 1;
    });

    window.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        toggleStart();
      }
      if (event.key.toLowerCase() === "r") resetGame();
    });

    window.addEventListener("resize", () => {
      setPointer(clamp(player.x, 0, window.innerWidth), clamp(player.y, 0, window.innerHeight));
    });

    startBtn.addEventListener("click", toggleStart);
    resetBtn.addEventListener("click", resetGame);

    ensureObjects();
    showToast("Start: vang bollen");
    updateHud();
    setupVfx();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
