<html lang="nl">
<head>
  <meta charset="utf-8" />

  <title>Liquid Absorb v10 Stable</title>
  <style>
    :root{
      --hud-bg:rgba(3,6,16,.82);
      --hud-line:rgba(255,255,255,.24);
      --text:#f8fcff;
      --muted:rgba(248,252,255,.68);
      --mint:#76ffe7;
      --red:#ff336b;
      --gold:#ffe48a;
    }
    *{box-sizing:border-box}
    html,body{
      width:100%;height:100%;margin:0;overflow:hidden;background:#050714;color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      touch-action:none;user-select:none;
    }
    button{font:inherit}
    #fxStage{
      position:fixed!important;inset:0!important;z-index:1!important;overflow:hidden!important;pointer-events:none!important;
      background:
        radial-gradient(circle at 12% 18%,rgba(90,255,232,.46),transparent 25%),
        radial-gradient(circle at 84% 14%,rgba(172,128,255,.44),transparent 25%),
        radial-gradient(circle at 78% 80%,rgba(255,221,118,.32),transparent 30%),
        radial-gradient(circle at 28% 90%,rgba(255,72,130,.24),transparent 29%),
        linear-gradient(135deg,#060818 0%,#0e1743 43%,#061b25 100%);

    }

      content:"";position:absolute;inset:-24%;opacity:.94;

        linear-gradient(rgba(255,255,255,.085) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.085) 1px,transparent 1px),
        repeating-linear-gradient(135deg,rgba(255,255,255,.065) 0 2px,transparent 2px 22px),
        repeating-radial-gradient(circle at 30% 30%,rgba(255,255,255,.05) 0 1px,transparent 1px 18px);
      background-size:52px 52px,52px 52px,100% 100%,220px 220px;
      mask-image:radial-gradient(circle at 50% 50%,black 0%,transparent 78%);
      animation:bgDrift 22s linear infinite;
    }
    #fxStage:after{
      content:"";position:absolute;inset:0;mix-blend-mode:screen;
      background:
        radial-gradient(circle at 50% 0%,rgba(255,255,255,.25),transparent 34%),
        linear-gradient(to bottom,rgba(255,255,255,.08),transparent 42%,rgba(0,0,0,.28));
    }

    .glass-card.b{width:33vw;height:29vh;right:4vw;bottom:12vh;transform:rotate(12deg)}
    .glass-card.c{width:22vw;height:16vh;left:49vw;top:9vh;transform:rotate(7deg)}
    .bg-title{position:absolute;left:3vw;bottom:7vh;font-size:clamp(72px,15vw,230px);line-height:.78;font-weight:950;letter-spacing:-.09em;color:rgba(255,255,255,.075);text-shadow:0 0 44px rgba(255,255,255,.14);white-space:nowrap}

        radial-gradient(circle at 30% 24%,rgba(255,255,255,.98),rgba(255,255,255,.14) 20%,transparent 34%),

    #message.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
    #shaderNote{position:fixed!important;z-index:2147483645!important;left:max(10px,env(safe-area-inset-left));bottom:max(10px,env(safe-area-inset-bottom));max-width:min(430px,calc(100vw - 20px));font-size:10px;color:rgba(248,252,255,.50);pointer-events:none}.no-vfx #shaderNote{color:var(--gold)}
    @media(max-width:760px){#hud{align-items:flex-start!important}.chip{min-width:auto;padding:6px 8px}.chip.optional{display:none}#statusbar{border-radius:20px!important;flex-wrap:wrap!important}#goalWrap{max-width:132px}#controls{flex-direction:column}.btn{padding:8px 10px}}
    @media(max-height:520px){.chip.landscapeHide{display:none}#message{display:none!important}#statusbar{flex-wrap:nowrap!important;max-width:calc(100vw - 152px)}}
  </style>

<body>
  <section id="fxStage" aria-hidden="true">

  <div id="fallbackOrb" aria-hidden="true"></div>

  <canvas id="particleCanvas" aria-hidden="true"></canvas>
  <header id="hud" aria-label="Statusbalk">

  <div id="message" class="show">Vang witte vormen. Ontwijk rode vijanden. Na 10 absorpties ga je door.</div>

    `;

    const GOAL=10,MAX_SHADER_BUBBLES=24,MAX_OBJECTS=34;
    const LEVELS=[{name:"Bol",shape:"circle",shader:0},{name:"Donut",shape:"donut",shader:1},{name:"Cube",shape:"cube",shader:2},{name:"Capsule",shape:"capsule",shader:3},{name:"Diamant",shape:"diamond",shader:4}];
    const fxStage=document.getElementById("fxStage"),objectCanvas=document.getElementById("objectCanvas"),particleCanvas=document.getElementById("particleCanvas"),octx=objectCanvas.getContext("2d",{alpha:true}),pctx=particleCanvas.getContext("2d",{alpha:true}),fallbackOrb=document.getElementById("fallbackOrb"),hud=document.getElementById("hud"),scoreEl=document.getElementById("score"),levelEl=document.getElementById("level"),targetNameEl=document.getElementById("targetName"),livesEl=document.getElementById("lives"),comboEl=document.getElementById("combo"),enemyCountEl=document.getElementById("enemyCount"),goalFill=document.getElementById("goalFill"),pauseBtn=document.getElementById("pauseBtn"),resetBtn=document.getElementById("resetBtn"),message=document.getElementById("message"),shaderNote=document.getElementById("shaderNote");
    const player={x:innerWidth/2,y:innerHeight*.72,tx:innerWidth/2,ty:innerHeight*.72,r:76};
    const state={running:true,over:false,score:0,lives:3,level:1,absorbed:0,combo:1,comboTime:0,spawnGood:.15,spawnEnemy:.6,hasPointer:false,lastPulse:performance.now()/1000};

    function showMessage(t,s=2.4){message.textContent=t;message.classList.add("show");msgTimer=s;}
    function bringLayersForward(){
      if(hud.parentElement!==document.body)document.body.appendChild(hud);
      hud.style.setProperty("z-index","2147483647","important");hud.style.setProperty("display","flex","important");hud.style.setProperty("visibility","visible","important");hud.style.setProperty("opacity","1","important");
      document.querySelectorAll("canvas").forEach(c=>{if(c===objectCanvas||c===particleCanvas)return;c.style.setProperty("position","fixed","important");c.style.setProperty("inset","0","important");c.style.setProperty("width","100vw","important");c.style.setProperty("height","100vh","important");c.style.setProperty("z-index","12","important");c.style.setProperty("pointer-events","none","important");});
    }
    new MutationObserver(bringLayersForward).observe(document.body,{childList:true,subtree:true});
    function resize(){dpr=clamp(devicePixelRatio||1,1,2);for(const c of [objectCanvas,particleCanvas]){c.width=Math.round(innerWidth*dpr);c.height=Math.round(innerHeight*dpr);c.style.width=innerWidth+"px";c.style.height=innerHeight+"px";}octx.setTransform(dpr,0,0,dpr,0,0);pctx.setTransform(dpr,0,0,dpr,0,0);player.x=clamp(player.x,0,innerWidth);player.y=clamp(player.y,0,innerHeight);player.tx=clamp(player.tx,0,innerWidth);player.ty=clamp(player.ty,0,innerHeight);bringLayersForward();}

    addEventListener("pointermove",e=>pointer(e.clientX,e.clientY),{passive:true});addEventListener("pointerdown",e=>{if(e.target.closest("button"))return;pointer(e.clientX,e.clientY);state.lastPulse=performance.now()/1000;if(state.over)resetGame();},{passive:true});
    pauseBtn.onclick=()=>{if(state.over){resetGame();return;}state.running=!state.running;pauseBtn.textContent=state.running?"Pauze":"Verder";showMessage(state.running?"Verder.":"Gepauzeerd.",1.1);};resetBtn.onclick=resetGame;addEventListener("keydown",e=>{if(e.code==="Space"){e.preventDefault();pauseBtn.click();}if(e.key.toLowerCase()==="r")resetGame();});
    function updateObjects(dt,now){if(!state.running)return;state.spawnGood-=dt;state.spawnEnemy-=dt;const c=counts();if((state.spawnGood<=0||c.good<2)&&c.good<clamp(5+Math.floor(state.level*.55),5,10)){spawnGood(false);state.spawnGood=clamp(.58-state.level*.014,.28,.58);}if((state.spawnEnemy<=0||c.enemy<1)&&c.enemy<clamp(2+Math.floor(state.level*.42),2,7)){spawnEnemy(false);state.spawnEnemy=clamp(1.1-state.level*.02,.42,1.1);}const magnet=player.r*2.75,hitGood=player.r*.64,hitEnemy=player.r*.59,data=levelData();for(const o of objects){if(!o.alive)continue;o.age+=dt;o.angle+=o.spin*dt;const dx=player.x-o.x,dy=player.y-o.y,d=Math.hypot(dx,dy)||1;if(o.kind==="good"&&d<magnet){const pull=(1-d/magnet)*(360+state.level*16);o.vx+=dx/d*pull*dt;o.vy+=dy/d*pull*dt;}if(o.kind==="enemy"&&d<player.r*3.0){const chase=(1-d/(player.r*3.0))*(75+state.level*5);o.vx+=dx/d*chase*dt;}o.x+=o.vx*dt;o.y+=o.vy*dt;o.vx+=Math.sin(now*.0018+o.pulse)*3*dt;o.vx*=.996;o.vy=clamp(o.vy,58,310+state.level*13);if(o.kind==="good"&&o.shape===data.shape&&d<hitGood+o.size*.55)absorb(o);else if(o.kind==="enemy"&&d<hitEnemy+o.size*.52)damage(o);if(o.y>innerHeight+140||o.x<-180||o.x>innerWidth+180)o.alive=false;}for(let i=objects.length-1;i>=0;i--)if(!objects[i].alive)objects.splice(i,1);}
    function updateParticles(dt){for(const p of particles){p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=220*dt;p.vx*=.985;}for(let i=particles.length-1;i>=0;i--)if(particles[i].life<=0)particles.splice(i,1);}
    function drawRoundedRect(ctx,x,y,w,h,r){const rr=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+rr,y);ctx.arcTo(x+w,y,x+w,y+h,rr);ctx.arcTo(x+w,y+h,x,y+h,rr);ctx.arcTo(x,y+h,x,y,rr);ctx.arcTo(x,y,x+rr,y,rr);ctx.closePath();}
    function shapePath(ctx,shape,size){const r=size/2;ctx.beginPath();if(shape==="circle")ctx.arc(0,0,r,0,Math.PI*2);else if(shape==="donut"){ctx.arc(0,0,r,0,Math.PI*2);ctx.moveTo(r*.44,0);ctx.arc(0,0,r*.44,0,Math.PI*2,true);}else if(shape==="cube")drawRoundedRect(ctx,-r,-r,size,size,size*.18);else if(shape==="capsule")drawRoundedRect(ctx,-size*.74,-size*.31,size*1.48,size*.62,size*.31);else{ctx.moveTo(0,-r);ctx.lineTo(r,0);ctx.lineTo(0,r);ctx.lineTo(-r,0);ctx.closePath();}}
    function enemyPath(ctx,o,size){if(o.shape==="wrong"){shapePath(ctx,o.wrongShape,size);return;}const r=size/2;ctx.beginPath();for(let i=0;i<12;i++){const a=i/12*Math.PI*2,rr=i%2===0?r:r*.47,x=Math.cos(a)*rr,y=Math.sin(a)*rr;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.closePath();}
    function drawObject(o,now){const size=o.size*(1+Math.sin(now*.006+o.pulse)*.045);octx.save();octx.translate(o.x,o.y);octx.rotate(o.angle);if(o.kind==="good"){octx.shadowBlur=34;octx.shadowColor="rgba(255,255,255,.76)";shapePath(octx,o.shape,size);octx.fillStyle="rgba(255,255,255,.20)";octx.fill(o.shape==="donut"?"evenodd":"nonzero");shapePath(octx,o.shape,size);octx.lineWidth=2.8;octx.strokeStyle="rgba(255,255,255,.96)";octx.stroke();octx.rotate(-o.angle);octx.beginPath();octx.arc(-size*.18,-size*.22,Math.max(4,size*.10),0,Math.PI*2);octx.fillStyle="rgba(255,255,255,.98)";octx.shadowBlur=22;octx.fill();}else{octx.shadowBlur=28;octx.shadowColor="rgba(255,51,107,.90)";enemyPath(octx,o,size);octx.fillStyle="rgba(255,51,107,.30)";octx.fill(o.shape==="wrong"&&o.wrongShape==="donut"?"evenodd":"nonzero");enemyPath(octx,o,size);octx.lineWidth=3;octx.strokeStyle="rgba(255,51,107,.98)";octx.stroke();octx.rotate(-o.angle);octx.lineWidth=3.2;octx.strokeStyle="rgba(255,255,255,.92)";octx.beginPath();octx.moveTo(-size*.16,-size*.16);octx.lineTo(size*.16,size*.16);octx.moveTo(size*.16,-size*.16);octx.lineTo(-size*.16,size*.16);octx.stroke();}octx.restore();}
    function drawCanvasHud(){
      const c=counts(),data=levelData(),pad=8,h=34,w=Math.min(innerWidth-16,650);
      octx.save();
      octx.setTransform(dpr,0,0,dpr,0,0);
      octx.shadowBlur=18;octx.shadowColor="rgba(0,0,0,.45)";
      octx.fillStyle="rgba(3,6,16,.82)";
      octx.strokeStyle="rgba(255,255,255,.24)";
      octx.lineWidth=1;
      drawRoundedRect(octx,pad,pad,w,h,17);
      octx.fill();octx.stroke();
      const prog=clamp(state.absorbed/GOAL,0,1);
      octx.fillStyle="rgba(255,255,255,.10)";
      drawRoundedRect(octx,pad+10,pad+23,Math.max(88,w-20),5,3);octx.fill();
      const grad=octx.createLinearGradient(pad+10,0,pad+w-10,0);
      grad.addColorStop(0,"#76ffe7");grad.addColorStop(.55,"#ffffff");grad.addColorStop(1,"#ffe48a");
      octx.fillStyle=grad;drawRoundedRect(octx,pad+10,pad+23,Math.max(4,(w-20)*prog),5,3);octx.fill();
      octx.shadowBlur=0;octx.font="800 12px system-ui, -apple-system, Segoe UI, sans-serif";octx.textBaseline="middle";
      octx.fillStyle="rgba(248,252,255,.96)";
      const txt=`Score ${Math.round(state.score)}   Level ${state.level}   Doel ${data.name}   Levens ${state.lives}   Combo x${state.combo}   Vijanden ${c.enemy}`;
      octx.fillText(txt,pad+12,pad+13);
      octx.restore();
    }
    function renderObjects(now){octx.clearRect(0,0,innerWidth,innerHeight);for(const o of objects)drawObject(o,now);drawCanvasHud();pctx.clearRect(0,0,innerWidth,innerHeight);for(const p of particles){const a=clamp(p.life/p.max,0,1);pctx.beginPath();pctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);pctx.fillStyle=`rgba(${p.color},${a})`;pctx.shadowBlur=18;pctx.shadowColor=`rgba(${p.color},${a})`;pctx.fill();}pctx.shadowBlur=0;}
    function updateShaderBubbles(now){const w=Math.max(1,innerWidth),h=Math.max(1,innerHeight),aspect=h/w;let j=0;for(const o of objects){if(j>=MAX_SHADER_BUBBLES)break;if(!o.alive||o.kind!=="good")continue;const k=j*4;bubbleUniform[k]=o.x/w-.5;bubbleUniform[k+1]=((h-o.y)/h-.5)*aspect;bubbleUniform[k+2]=Math.sin(now*.0015+o.pulse)*.026;bubbleUniform[k+3]=o.size*.48/w;j++;}for(;j<MAX_SHADER_BUBBLES;j++){const k=j*4;bubbleUniform[k]=0;bubbleUniform[k+1]=0;bubbleUniform[k+2]=0;bubbleUniform[k+3]=0;}}
    function update(dt,now){if(!state.hasPointer&&state.running){player.tx=innerWidth/2+Math.sin(now*.00034)*innerWidth*.16;player.ty=innerHeight*.72+Math.cos(now*.00043)*innerHeight*.06;}const sm=state.hasPointer?.22:.045;player.x+=(player.tx-player.x)*sm;player.y+=(player.ty-player.y)*sm;if(state.comboTime>0&&state.running){state.comboTime-=dt;if(state.comboTime<=0)state.combo=1;}if(msgTimer>0){msgTimer-=dt;if(msgTimer<=0&&!state.over)message.classList.remove("show");}updateObjects(dt,now);updateParticles(dt);updateShaderBubbles(now);updateHud();}
    function render(now){fallbackOrb.style.left=player.x+"px";fallbackOrb.style.top=player.y+"px";fallbackOrb.style.width=player.r*2+"px";fallbackOrb.style.height=player.r*2+"px";renderObjects(now);}
    function frame(now){const dt=Math.min(.04,(now-lastNow)/1000||.016);lastNow=now;update(dt,now);render(now);if(Math.floor(now)%500<18)bringLayersForward();requestAnimationFrame(frame);} 
    async function setupVfx(){try{const {VFX}=await import("https://esm.sh/@vfx-js/core@0.11.1");const vfx=new VFX({postEffect:{shader:SHADER,uniforms:{time:()=>performance.now()/1000,playerPx:()=>[player.x*dpr,(innerHeight-player.y)*dpr],playerR:()=>player.r/Math.max(1,innerWidth),distortion:()=>.076,shapeIndex:()=>levelData().shader,pulseAge:()=>performance.now()/1000-state.lastPulse,bubbleData:()=>bubbleUniform}}});await vfx.addHTML(fxStage,{shader:"none"});vfx.play();vfxReady=true;document.body.classList.remove("no-vfx");shaderNote.textContent="Liquid shader actief. Statusbar en vijanden staan boven de shader.";bringLayersForward();setInterval(bringLayersForward,500);}catch(err){console.warn("VFX JS kon niet laden",err);document.body.classList.add("no-vfx");shaderNote.textContent="Shader kon niet laden. Fallback orb actief, game blijft speelbaar.";}}
    addEventListener("resize",resize);resize();resetGame();bringLayersForward();setupVfx();requestAnimationFrame(frame);
  </script>
</body>
