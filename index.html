<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Liquid Absorb Pro</title>
  <style>
    :root {
      --text: #f7fbff;
      --muted: rgba(247, 251, 255, .66);
      --panel: rgba(7, 10, 22, .48);
      --line: rgba(255, 255, 255, .18);
      --mint: #8fffea;
      --danger: #ff4778;
      --gold: #ffd26f;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--text);
      background: #050715;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
      touch-action: none;
    }

    button { font: inherit; }

    #game {
      position: fixed;
      inset: 0;
      overflow: hidden;
      isolation: isolate;
      background: #050715;
      cursor: none;
    }

    #vfxStage {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 22%, rgba(96, 255, 225, .40), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(160, 115, 255, .32), transparent 25%),
        radial-gradient(circle at 62% 88%, rgba(255, 210, 111, .28), transparent 27%),
        linear-gradient(135deg, #060816 0%, #111d3f 42%, #061b24 100%);
      transform: translateZ(0);
    }

    #vfxStage::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        linear-gradient(rgba(255,255,255,.075) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.075) 1px, transparent 1px),
        repeating-linear-gradient(135deg, rgba(255,255,255,.055) 0 2px, transparent 2px 22px);
      background-size: 48px 48px, 48px 48px, 100% 100%;
      mask-image: radial-gradient(circle at 50% 50%, black 0%, transparent 76%);
      animation: drift 28s linear infinite;
      opacity: .9;
    }

    #vfxStage::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.22), transparent 34%),
        linear-gradient(to bottom, rgba(255,255,255,.08), transparent 40%, rgba(0,0,0,.22));
      mix-blend-mode: screen;
    }

    .contrast-card {
      position: absolute;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 34px;
      background: linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.045));
      box-shadow: inset 0 0 70px rgba(255,255,255,.04), 0 30px 110px rgba(0,0,0,.22);
    }

    .contrast-card.one { width: 38vw; height: 22vh; left: 7vw; top: 22vh; transform: rotate(-10deg); }
    .contrast-card.two { width: 32vw; height: 28vh; right: 5vw; bottom: 12vh; transform: rotate(12deg); }
    .contrast-card.three { width: 22vw; height: 18vh; left: 46vw; top: 8vh; transform: rotate(8deg); }

    .bg-word {
      position: absolute;
      left: 4vw;
      bottom: 9vh;
      font-size: clamp(72px, 14vw, 210px);
      line-height: .8;
      font-weight: 900;
      letter-spacing: -.09em;
      color: rgba(255,255,255,.08);
      text-shadow: 0 0 42px rgba(255,255,255,.13);
      white-space: nowrap;
    }

    @keyframes drift {
      from { transform: translate3d(0,0,0) rotate(0deg); }
      to { transform: translate3d(-48px,-48px,0) rotate(1.5deg); }
    }

    #targetCanvas {
      position: absolute;
      inset: 0;
      z-index: 4;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #fallbackPlayer {
      position: absolute;
      z-index: 3;
      left: 50%;
      top: 50%;
      width: 140px;
      height: 140px;
      border-radius: 999px;
      transform: translate3d(-50%, -50%, 0);
      opacity: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 30% 24%, rgba(255,255,255,.95), rgba(255,255,255,.12) 22%, transparent 36%),
        radial-gradient(circle at 65% 72%, rgba(255,255,255,.22), transparent 44%),
        radial-gradient(circle, rgba(145,255,238,.38), rgba(125,160,255,.13) 64%, rgba(255,255,255,.06));
      box-shadow: inset 18px 22px 46px rgba(255,255,255,.26), inset -20px -24px 48px rgba(0,0,0,.24), 0 0 80px rgba(120,255,232,.26);
      transition: opacity .18s ease;
    }

    .no-vfx #fallbackPlayer { opacity: .65; }

    #hud {
      position: absolute;
      left: max(10px, env(safe-area-inset-left));
      right: max(10px, env(safe-area-inset-right));
      top: max(10px, env(safe-area-inset-top));
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      pointer-events: none;
    }

    .statusbar {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      max-width: calc(100vw - 126px);
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      backdrop-filter: blur(18px) saturate(150%);
      box-shadow: 0 14px 44px rgba(0,0,0,.24);
    }

    .chip {
      min-width: 58px;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: rgba(247,251,255,.72);
      font-size: 11px;
      line-height: 1;
      letter-spacing: .01em;
      white-space: nowrap;
    }

    .chip strong {
      display: inline-block;
      margin-left: 4px;
      color: #fff;
      font-size: 13px;
      font-weight: 850;
      letter-spacing: -.02em;
      font-variant-numeric: tabular-nums;
    }

    .progress {
      width: clamp(86px, 16vw, 170px);
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
    }

    #progressFill {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--mint), #fff, var(--gold));
      box-shadow: 0 0 22px rgba(143,255,234,.48);
      transition: width .15s ease;
    }

    .controls {
      display: flex;
      gap: 6px;
      pointer-events: auto;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 11px;
      color: var(--text);
      background: var(--panel);
      backdrop-filter: blur(18px) saturate(150%);
      cursor: pointer;
      box-shadow: 0 12px 36px rgba(0,0,0,.22);
    }

    .btn.primary {
      color: #061018;
      border-color: rgba(255,255,255,.7);
      background: linear-gradient(135deg, #8fffea, #fff4a7);
      font-weight: 850;
    }

    #toast {
      position: absolute;
      z-index: 22;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      max-width: min(520px, calc(100vw - 24px));
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: rgba(247,251,255,.86);
      background: rgba(7,10,22,.48);
      backdrop-filter: blur(18px) saturate(150%);
      box-shadow: 0 12px 44px rgba(0,0,0,.22);
      font-size: 13px;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity .18s ease, transform .18s ease;
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

    #shaderStatus {
      position: absolute;
      z-index: 19;
      left: max(10px, env(safe-area-inset-left));
      bottom: max(10px, env(safe-area-inset-bottom));
      max-width: min(420px, calc(100vw - 20px));
      color: rgba(247,251,255,.56);
      font-size: 11px;
      pointer-events: none;
    }

    .no-vfx #shaderStatus { color: var(--gold); }

    @media (max-width: 720px) {
      #hud { align-items: flex-start; }
      .statusbar { max-width: calc(100vw - 92px); border-radius: 20px; }
      .chip { min-width: auto; padding: 6px 8px; }
      .chip.hide-small { display: none; }
      .controls { flex-direction: column; }
      .btn { padding: 8px 10px; }
      .progress { width: 92px; }
    }

    @media (max-height: 520px) {
      #toast { display: none; }
      .chip.hide-landscape { display: none; }
      .statusbar { max-width: calc(100vw - 154px); }
    }
  </style>
</head>
<body>
  <main id="game" aria-label="Liquid Absorb Pro">
    <section id="vfxStage" aria-hidden="true">
      <div class="contrast-card one"></div>
      <div class="contrast-card two"></div>
      <div class="contrast-card three"></div>
      <div class="bg-word">LIQUID</div>
    </section>

    <div id="fallbackPlayer" aria-hidden="true"></div>
    <canvas id="targetCanvas" aria-hidden="true"></canvas>

    <header id="hud">
      <div class="statusbar">
        <span class="chip">Score<strong id="score">0</strong></span>
        <span class="chip">Level<strong id="level">1</strong></span>
        <span class="chip hide-small">Vorm<strong id="shapeName">Bol</strong></span>
        <span class="chip">Levens<strong id="lives">3</strong></span>
        <span class="chip hide-landscape">Groei<strong id="size">76</strong></span>
        <span class="progress" aria-hidden="true"><span id="progressFill"></span></span>
      </div>
      <nav class="controls">
        <button id="pauseButton" class="btn" type="button">Pauze</button>
        <button id="resetButton" class="btn primary" type="button">Reset</button>
      </nav>
    </header>

    <div id="toast" class="show">Vang de witte vorm. Ontwijk rood. Na 10 absorpties verandert je liquid vorm.</div>
    <div id="shaderStatus">Liquid shader laden...</div>
  </main>

  <script type="module">
    const SHADER = "\n      precision highp float;\n\n      uniform sampler2D src;\n      uniform vec2 resolution;\n      uniform vec2 offset;\n      uniform float time;\n      uniform vec2 playerPx;\n      uniform float playerR;\n      uniform float distortion;\n      uniform int shapeIndex;\n      uniform float clickTime;\n      uniform int clickCount;\n      uniform float bubbleData[112];\n\n      out vec4 outColor;\n\n      const int MAX_ITEMS = 28;\n\n      float smin(float a, float b, float k) {\n        float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);\n        return mix(b, a, h) - k * h * (1.0 - h);\n      }\n\n      mat2 rot(float a) {\n        float c = cos(a);\n        float s = sin(a);\n        return mat2(c, -s, s, c);\n      }\n\n      float sdSphere(vec3 p, float r) {\n        return length(p) - r;\n      }\n\n      float sdBox(vec3 p, vec3 b, float r) {\n        vec3 q = abs(p) - b + r;\n        return length(max(q, 0.0)) + min(max(q.x, max(q.y, q.z)), 0.0) - r;\n      }\n\n      float sdTorus(vec3 p, vec2 t) {\n        vec2 q = vec2(length(p.xy) - t.x, p.z);\n        return length(q) - t.y;\n      }\n\n      float sdCapsule(vec3 p, vec3 a, vec3 b, float r) {\n        vec3 pa = p - a;\n        vec3 ba = b - a;\n        float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);\n        return length(pa - ba * h) - r;\n      }\n\n      float sdOctahedron(vec3 p, float s) {\n        p = abs(p);\n        return (p.x + p.y + p.z - s) * 0.57735027;\n      }\n\n      vec3 centerWorld() {\n        vec2 uv = playerPx / resolution;\n        float aspect = resolution.y / resolution.x;\n        return vec3((uv - 0.5) * vec2(1.0, aspect), 0.0);\n      }\n\n      float scene(vec3 p) {\n        vec3 c = centerWorld();\n        vec3 q = p - c;\n\n        float pulseAge = min(clickTime, 0.8);\n        float pulse = exp(-pulseAge * 5.5) * sin(pulseAge * 25.0) * 0.09;\n        float r = playerR * (1.0 + pulse);\n\n        q.xy *= rot(sin(time * 0.8) * 0.12);\n        q.xz *= rot(cos(time * 0.7) * 0.08);\n        q.z += sin(q.x * 34.0 + q.y * 12.0 + time * 3.2) * 0.006;\n\n        float d = sdSphere(q, r);\n\n        if (shapeIndex == 1) {\n          d = sdBox(q, vec3(r * 0.72), r * 0.23);\n        } else if (shapeIndex == 2) {\n          d = sdTorus(q, vec2(r * 0.78, r * 0.23));\n        } else if (shapeIndex == 3) {\n          d = sdCapsule(q, vec3(-r * 0.88, 0.0, 0.0), vec3(r * 0.88, 0.0, 0.0), r * 0.44);\n        } else if (shapeIndex == 4) {\n          d = sdOctahedron(q, r * 1.1);\n        }\n\n        for (int i = 0; i < MAX_ITEMS; i++) {\n          int k = i * 4;\n          float br = bubbleData[k + 3];\n          if (br > 0.0001) {\n            vec3 bp = vec3(bubbleData[k], bubbleData[k + 1], bubbleData[k + 2]);\n            float bd = sdSphere(p - bp, br);\n            d = smin(d, bd, max(0.012, br * 0.7));\n          }\n        }\n\n        return d;\n      }\n\n      vec3 calcNormal(vec3 p) {\n        vec2 e = vec2(0.0015, 0.0);\n        return normalize(vec3(\n          scene(p + e.xyy) - scene(p - e.xyy),\n          scene(p + e.yxy) - scene(p - e.yxy),\n          scene(p + e.yyx) - scene(p - e.yyx)\n        ));\n      }\n\n      vec4 readSrc(vec2 uv) {\n        vec2 safeUv = clamp(uv, vec2(0.001), vec2(0.999));\n        vec4 c = texture(src, safeUv);\n        vec4 base = vec4(0.03, 0.05, 0.10, 1.0);\n        return mix(base, c, c.a);\n      }\n\n      void main() {\n        vec2 uv = (gl_FragCoord.xy - offset) / resolution;\n        float aspect = resolution.y / resolution.x;\n        vec2 p2 = (uv - 0.5) * vec2(1.0, aspect);\n\n        vec3 ro = vec3(0.0, 0.0, -1.9);\n        vec3 rd = normalize(vec3(p2, 1.65));\n\n        float t = 0.0;\n        bool hit = false;\n        vec3 pos = vec3(0.0);\n\n        for (int i = 0; i < 56; i++) {\n          pos = ro + rd * t;\n          float d = scene(pos);\n          if (d < 0.0012) {\n            hit = true;\n            break;\n          }\n          t += d * 0.78;\n          if (t > 4.0) {\n            break;\n          }\n        }\n\n        if (!hit) {\n          outColor = readSrc(uv);\n          return;\n        }\n\n        vec3 n = calcNormal(pos);\n        float ndv = max(dot(n, -rd), 0.0);\n        float fres = pow(1.0 - ndv, 4.0);\n\n        vec2 wobble = vec2(\n          sin(uv.y * 80.0 + time * 2.4),\n          cos(uv.x * 70.0 - time * 2.1)\n        ) * 0.0015;\n\n        vec2 refractUv = uv - n.xy * distortion * (0.75 + fres * 1.8) + wobble;\n        vec3 col;\n        col.r = readSrc(refractUv + n.xy * distortion * 0.26).r;\n        col.g = readSrc(refractUv).g;\n        col.b = readSrc(refractUv - n.xy * distortion * 0.20).b;\n\n        vec3 lightA = normalize(vec3(-0.45, 0.7, -0.55));\n        vec3 lightB = normalize(vec3(0.7, -0.25, -0.25));\n        float specA = pow(max(dot(reflect(-lightA, n), -rd), 0.0), 160.0);\n        float specB = pow(max(dot(reflect(-lightB, n), -rd), 0.0), 48.0);\n\n        col = mix(col, vec3(1.0), 0.10 + fres * 0.28);\n        col += vec3(0.45, 0.98, 0.9) * fres * 0.28;\n        col += vec3(1.0) * specA * 1.8 + vec3(0.7, 0.9, 1.0) * specB * 0.45;\n        col = clamp(col, 0.0, 1.0);\n\n        outColor = vec4(col, 1.0);\n      }\n    ";

    const MAX_SHADER_BUBBLES = 28;
    const TARGET_GOAL = 10;

    const LEVELS = [
      { name: "Bol", shaderShape: 0, targetShape: "circle" },
      { name: "Donut", shaderShape: 2, targetShape: "donut" },
      { name: "Cube", shaderShape: 1, targetShape: "cube" },
      { name: "Capsule", shaderShape: 3, targetShape: "capsule" },
      { name: "Diamant", shaderShape: 4, targetShape: "diamond" }
    ];

    const game = document.getElementById("game");
    const vfxStage = document.getElementById("vfxStage");
    const canvas = document.getElementById("targetCanvas");
    const ctx = canvas.getContext("2d");
    const fallbackPlayer = document.getElementById("fallbackPlayer");

    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const livesEl = document.getElementById("lives");
    const shapeNameEl = document.getElementById("shapeName");
    const sizeEl = document.getElementById("size");
    const progressFill = document.getElementById("progressFill");
    const pauseButton = document.getElementById("pauseButton");
    const resetButton = document.getElementById("resetButton");
    const toast = document.getElementById("toast");
    const shaderStatus = document.getElementById("shaderStatus");

    const player = {
      x: window.innerWidth / 2,
      y: window.innerHeight * 0.72,
      tx: window.innerWidth / 2,
      ty: window.innerHeight * 0.72,
      r: 76
    };

    const state = {
      running: true,
      score: 0,
      lives: 3,
      level: 0,
      absorbed: 0,
      combo: 1,
      spawnTimer: 0,
      lastPulse: performance.now() / 1000,
      clickCount: 0,
      hasPointer: false,
      gameOver: false,
      shaderReady: false
    };

    const targets = [];
    const bubbleUniform = new Float32Array(MAX_SHADER_BUBBLES * 4);
    let lastFrame = performance.now();
    let toastTimer = 4.5;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function choose(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function distance(ax, ay, bx, by) {
      return Math.hypot(ax - bx, ay - by);
    }

    function currentLevel() {
      return LEVELS[state.level % LEVELS.length];
    }

    function showToast(message, seconds = 2.4) {
      toast.textContent = message;
      toast.classList.add("show");
      toastTimer = seconds;
    }

    function resizeCanvas() {
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      canvas.width = Math.round(window.innerWidth * dpr);
      canvas.height = Math.round(window.innerHeight * dpr);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      player.tx = clamp(player.tx, 0, window.innerWidth);
      player.ty = clamp(player.ty, 0, window.innerHeight);
      player.x = clamp(player.x, 0, window.innerWidth);
      player.y = clamp(player.y, 0, window.innerHeight);
    }

    function targetCount() {
      return clamp(7 + state.level * 2, 7, 15);
    }

    function spawnTarget(forceCorrect = false) {
      const level = currentLevel();
      const correctRoll = forceCorrect || Math.random() > clamp(0.38 + state.level * 0.03, 0.38, 0.58);
      const shapePool = LEVELS.map((item) => item.targetShape);
      let shape = level.targetShape;
      let kind = "good";

      if (!correctRoll) {
        kind = "bad";
        const wrongShapes = shapePool.filter((item) => item !== level.targetShape);
        shape = choose(wrongShapes);
      }

      const size = rand(34, 54) + Math.min(state.level * 3, 14);
      const speed = rand(78, 124) + state.level * 14;
      targets.push({
        x: rand(60, Math.max(61, window.innerWidth - 60)),
        y: -size - rand(0, 160),
        vx: rand(-18, 18),
        vy: speed,
        size,
        shape,
        kind,
        active: true,
        spin: rand(-1.8, 1.8),
        angle: rand(0, Math.PI * 2),
        age: 0,
        absorbed: false,
        alpha: 1,
        pulse: rand(0, Math.PI * 2)
      });
    }

    function resetGame() {
      state.running = true;
      state.gameOver = false;
      state.score = 0;
      state.lives = 3;
      state.level = 0;
      state.absorbed = 0;
      state.combo = 1;
      state.spawnTimer = 0;
      state.clickCount += 1;
      state.lastPulse = performance.now() / 1000;
      player.r = 76;
      targets.length = 0;
      for (let i = 0; i < 8; i++) spawnTarget(i < 5);
      pauseButton.textContent = "Pauze";
      showToast("Vang de witte bol. Ontwijk rood. Groei naar level 2.", 3.2);
      updateHud();
    }

    function pulse() {
      state.clickCount += 1;
      state.lastPulse = performance.now() / 1000;
    }

    function absorbTarget(target) {
      if (!target.active) return;
      target.active = false;
      pulse();
      state.absorbed += 1;
      state.score += 100 + state.level * 25 + state.combo * 12;
      state.combo = clamp(state.combo + 1, 1, 8);
      player.r = clamp(player.r + 4.8, 54, 138);
      makeBurst(target.x, target.y, "good");

      if (state.absorbed >= TARGET_GOAL) {
        state.level += 1;
        state.absorbed = 0;
        state.combo = 1;
        player.r = clamp(74 + state.level * 7, 74, 132);
        pulse();
        showToast(`Level ${state.level + 1}: vang nu ${currentLevel().name.toLowerCase()} vormen.`, 2.8);
        for (let i = 0; i < 3; i++) spawnTarget(true);
      }
    }

    function damageTarget(target) {
      if (!target.active) return;
      target.active = false;
      pulse();
      state.lives -= 1;
      state.combo = 1;
      player.r = clamp(player.r - 20, 44, 138);
      makeBurst(target.x, target.y, "bad");
      game.animate([
        { transform: "translate3d(0,0,0)" },
        { transform: "translate3d(-9px,0,0)" },
        { transform: "translate3d(8px,0,0)" },
        { transform: "translate3d(0,0,0)" }
      ], { duration: 220, easing: "ease-out" });
      if (state.lives <= 0) endGame();
    }

    function endGame() {
      state.running = false;
      state.gameOver = true;
      pauseButton.textContent = "Verder";
      showToast(`Game over. Score ${Math.round(state.score)}. Druk Reset voor een nieuwe ronde.`, 999);
    }

    function makeBurst(x, y, kind) {
      const color = kind === "bad" ? "rgba(255,71,120,.95)" : "rgba(255,255,255,.95)";
      const count = kind === "bad" ? 18 : 14;
      for (let i = 0; i < count; i++) {
        const dot = document.createElement("i");
        const angle = (i / count) * Math.PI * 2 + rand(-0.16, 0.16);
        const dist = rand(26, kind === "bad" ? 86 : 70);
        dot.style.cssText = `
          position:absolute;z-index:18;left:${x}px;top:${y}px;width:7px;height:7px;border-radius:999px;
          pointer-events:none;background:${color};box-shadow:0 0 18px ${color};transform:translate(-50%,-50%);`;
        game.appendChild(dot);
        dot.animate([
          { transform: "translate(-50%,-50%) scale(1)", opacity: 1 },
          { transform: `translate(calc(-50% + ${Math.cos(angle) * dist}px), calc(-50% + ${Math.sin(angle) * dist}px)) scale(.15)`, opacity: 0 }
        ], { duration: 520, easing: "cubic-bezier(.1,.7,.2,1)" }).finished.finally(() => dot.remove());
      }
    }

    function updateHud() {
      const level = currentLevel();
      scoreEl.textContent = Math.round(state.score).toString();
      levelEl.textContent = String(state.level + 1);
      livesEl.textContent = String(state.lives);
      shapeNameEl.textContent = level.name;
      sizeEl.textContent = String(Math.round(player.r));
      progressFill.style.width = `${(state.absorbed / TARGET_GOAL) * 100}%`;
    }

    function handlePointer(clientX, clientY) {
      const rect = game.getBoundingClientRect();
      player.tx = clamp(clientX - rect.left, 0, rect.width);
      player.ty = clamp(clientY - rect.top, 0, rect.height);
      state.hasPointer = true;
    }

    game.addEventListener("pointermove", (event) => handlePointer(event.clientX, event.clientY), { passive: true });
    game.addEventListener("pointerdown", (event) => {
      if (event.target.closest("button")) return;
      handlePointer(event.clientX, event.clientY);
      pulse();
      if (state.gameOver) resetGame();
    });

    pauseButton.addEventListener("click", () => {
      if (state.gameOver) { resetGame(); return; }
      state.running = !state.running;
      pauseButton.textContent = state.running ? "Pauze" : "Verder";
      showToast(state.running ? "Verder." : "Gepauzeerd.", 1.2);
    });

    resetButton.addEventListener("click", resetGame);

    window.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        pauseButton.click();
      }
      if (event.key.toLowerCase() === "r") resetGame();
    });

    function updateTargets(dt, now) {
      if (!state.running) return;

      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        if (targets.filter((target) => target.active).length < targetCount()) spawnTarget(false);
        state.spawnTimer = clamp(0.55 - state.level * 0.035, 0.27, 0.55);
      }

      const level = currentLevel();
      const magnetRange = player.r * 2.6;
      const hitBase = player.r * 0.62;

      for (const target of targets) {
        if (!target.active) continue;
        target.age += dt;
        target.angle += target.spin * dt;

        const dx = player.x - target.x;
        const dy = player.y - target.y;
        const d = Math.hypot(dx, dy) || 1;
        const isCorrect = target.kind === "good" && target.shape === level.targetShape;

        if (isCorrect && d < magnetRange) {
          const pull = (1 - d / magnetRange) * (340 + state.level * 30);
          target.vx += (dx / d) * pull * dt;
          target.vy += (dy / d) * pull * dt;
        }

        target.x += target.vx * dt;
        target.y += target.vy * dt;
        target.vx += Math.sin(now * 0.0017 + target.pulse) * 2.3 * dt;
        target.vx *= 0.996;
        target.vy = clamp(target.vy, 54, 330 + state.level * 18);

        if (d < hitBase + target.size * 0.52) {
          if (isCorrect) absorbTarget(target);
          else damageTarget(target);
        }

        if (target.y > window.innerHeight + 110 || target.x < -130 || target.x > window.innerWidth + 130) {
          target.active = false;
        }
      }

      for (let i = targets.length - 1; i >= 0; i--) {
        if (!targets[i].active) targets.splice(i, 1);
      }
    }

    function drawRoundedRect(ctx, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    function drawShapePath(shape, s) {
      const r = s / 2;
      ctx.beginPath();
      if (shape === "circle") {
        ctx.arc(0, 0, r, 0, Math.PI * 2);
      } else if (shape === "donut") {
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.moveTo(r * .45, 0);
        ctx.arc(0, 0, r * .45, 0, Math.PI * 2, true);
      } else if (shape === "cube") {
        drawRoundedRect(ctx, -r, -r, s, s, s * .18);
      } else if (shape === "capsule") {
        drawRoundedRect(ctx, -s * .72, -s * .31, s * 1.44, s * .62, s * .31);
      } else if (shape === "diamond") {
        ctx.moveTo(0, -r);
        ctx.lineTo(r, 0);
        ctx.lineTo(0, r);
        ctx.lineTo(-r, 0);
        ctx.closePath();
      }
    }

    function drawTarget(target, now) {
      const level = currentLevel();
      const isCorrect = target.kind === "good" && target.shape === level.targetShape;
      const s = target.size * (1 + Math.sin(now * 0.005 + target.pulse) * 0.045);
      ctx.save();
      ctx.translate(target.x, target.y);
      ctx.rotate(target.angle);
      ctx.globalAlpha = target.alpha;

      ctx.shadowBlur = isCorrect ? 28 : 22;
      ctx.shadowColor = isCorrect ? "rgba(255,255,255,.75)" : "rgba(255,71,120,.75)";
      drawShapePath(target.shape, s);
      ctx.fillStyle = isCorrect ? "rgba(255,255,255,.16)" : "rgba(255,71,120,.22)";
      ctx.fill(target.shape === "donut" ? "evenodd" : "nonzero");

      drawShapePath(target.shape, s);
      ctx.lineWidth = isCorrect ? 2.7 : 2.4;
      ctx.strokeStyle = isCorrect ? "rgba(255,255,255,.92)" : "rgba(255,71,120,.95)";
      ctx.stroke();

      if (isCorrect) {
        ctx.rotate(-target.angle);
        ctx.beginPath();
        ctx.arc(-s * .18, -s * .22, Math.max(3, s * .11), 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,.92)";
        ctx.shadowBlur = 18;
        ctx.shadowColor = "rgba(255,255,255,.95)";
        ctx.fill();
      } else {
        ctx.rotate(-target.angle);
        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(255,255,255,.82)";
        ctx.beginPath();
        ctx.moveTo(-s * .18, -s * .18);
        ctx.lineTo(s * .18, s * .18);
        ctx.moveTo(s * .18, -s * .18);
        ctx.lineTo(-s * .18, s * .18);
        ctx.stroke();
      }

      ctx.restore();
    }

    function renderTargets(now) {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      for (const target of targets) drawTarget(target, now);
    }

    function updateBubbleUniforms(now) {
      const w = Math.max(1, window.innerWidth);
      const h = Math.max(1, window.innerHeight);
      const aspect = h / w;
      let j = 0;
      const level = currentLevel();

      for (const target of targets) {
        if (j >= MAX_SHADER_BUBBLES) break;
        const isCorrect = target.active && target.kind === "good" && target.shape === level.targetShape;
        if (!isCorrect) continue;
        const k = j * 4;
        bubbleUniform[k] = target.x / w - 0.5;
        bubbleUniform[k + 1] = ((h - target.y) / h - 0.5) * aspect;
        bubbleUniform[k + 2] = Math.sin(now * 0.0014 + target.pulse) * 0.026;
        bubbleUniform[k + 3] = (target.size * 0.52) / w;
        j++;
      }

      for (; j < MAX_SHADER_BUBBLES; j++) {
        const k = j * 4;
        bubbleUniform[k] = 0;
        bubbleUniform[k + 1] = 0;
        bubbleUniform[k + 2] = 0;
        bubbleUniform[k + 3] = 0;
      }
    }

    function update(dt, now) {
      if (!state.hasPointer && state.running) {
        player.tx = window.innerWidth / 2 + Math.sin(now * 0.00035) * window.innerWidth * 0.16;
        player.ty = window.innerHeight * 0.72 + Math.cos(now * 0.00046) * window.innerHeight * 0.06;
      }

      const smoothing = state.hasPointer ? 0.21 : 0.035;
      player.x += (player.tx - player.x) * smoothing;
      player.y += (player.ty - player.y) * smoothing;

      if (toastTimer > 0) {
        toastTimer -= dt;
        if (toastTimer <= 0 && !state.gameOver) toast.classList.remove("show");
      }

      updateTargets(dt, now);
      updateBubbleUniforms(now);
      updateHud();
    }

    function render(now) {
      fallbackPlayer.style.left = `${player.x}px`;
      fallbackPlayer.style.top = `${player.y}px`;
      fallbackPlayer.style.width = `${player.r * 2}px`;
      fallbackPlayer.style.height = `${player.r * 2}px`;
      renderTargets(now);
    }

    function frame(now) {
      const dt = Math.min(0.04, (now - lastFrame) / 1000);
      lastFrame = now;
      update(dt, now);
      render(now);
      requestAnimationFrame(frame);
    }

    function lockVfxCanvasLayer() {
      for (const item of document.querySelectorAll("canvas")) {
        if (item === canvas) continue;
        item.style.pointerEvents = "none";
        item.style.zIndex = "2";
      }
    }

    async function setupVfx() {
      try {
        const { VFX } = await import("https://esm.sh/@vfx-js/core@0.11.1");
        const vfx = new VFX({
          postEffect: {
            shader: SHADER,
            uniforms: {
              playerPx: () => [
                player.x * window.devicePixelRatio,
                (window.innerHeight - player.y) * window.devicePixelRatio
              ],
              playerR: () => player.r / Math.max(1, window.innerWidth),
              distortion: () => 0.068,
              shapeIndex: () => currentLevel().shaderShape,
              clickTime: () => performance.now() / 1000 - state.lastPulse,
              clickCount: () => state.clickCount,
              bubbleData: () => bubbleUniform
            }
          }
        });

        await vfx.addHTML(vfxStage, { shader: "none" });
        vfx.play();
        state.shaderReady = true;
        shaderStatus.textContent = "Liquid shader actief. Doelen worden apart getekend zodat ze zichtbaar blijven.";
        lockVfxCanvasLayer();
        setTimeout(lockVfxCanvasLayer, 250);
        setTimeout(lockVfxCanvasLayer, 1000);
      } catch (error) {
        console.warn("VFX JS kon niet laden", error);
        game.classList.add("no-vfx");
        shaderStatus.textContent = "Shader kon niet laden. Game draait met fallback speler.";
      }
    }

    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    resetGame();
    setupVfx();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
